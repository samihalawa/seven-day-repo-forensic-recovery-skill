interface:
  display_name: "7 Day Repo Forensic Recovery"
  short_description: "Reconstruct the last 7 days across local and remote sources, classify kept vs lost work, then manually restore only still-valid gaps"
  default_prompt: "Use $seven-day-repo-forensic-recovery-skill to run a strict 7-day multi-source repo recovery across the current thread, local assistant histories, clipboard stores, terminal evidence, repo docs, git, remote branches, and GitHub PRs. Build the evidence ledger, classify each workstream as kept, lost, replaced, restored-now, or not-restored-on-purpose, verify the current repo before any edit, and in execution mode manually port only the still-valid missing work onto the current codebase."
