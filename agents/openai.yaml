interface:
  display_name: "Ledger Driven Repo Forensic Recovery"
  short_description: "Use tracking-ledger-driven defaults, sweep all source families, classify kept vs lost work, then manually restore only still-valid gaps"
  default_prompt: "Use $ledger-driven-repo-forensic-recovery-skill to run a strict ledger-driven repo recovery. Read tracking-ledger.json first, derive the pending day range from the last fully tracked day, sweep all discoverable source families by default including current thread, local assistant histories, clipboard stores, terminal evidence, repo docs, git, remote branches, and GitHub PRs, maintain ~/.repo-forensic-recovery-memory.json alongside the ledger, classify each workstream as kept, lost, replaced, restored-now, or not-restored-on-purpose, verify the current repo before any edit, and in execution mode manually port only the still-valid missing work onto the current codebase."
